name: Leagues refresh

# Runs the four-league predictor in GitHub's cloud -- independent of any laptop
# being on and of Claude running. Everything it does is deterministic Python:
# fetch data -> fit model -> simulate season -> build props -> sanity-check ->
# commit -> trigger the Render deploy. No AI judgment in this path.
#
# It deliberately touches ONLY data/leagues/** and data-raw/leagues/**. The World
# Cup engine (predict.py, data/predictions.json) is never run or committed here.

on:
  schedule:
    # Independent team-news research. The script exits without network calls when
    # no Best Pick is within 72h, so this can cover midweek fixtures as well as
    # weekends without needing Claude/ChatGPT to be open.
    - cron: "15 */3 * * *"
    # Tuesday 06:00 UTC -- the weekly refit, after Monday-night football settles.
    - cron: "0 6 * * 2"
    # MATCHDAYS, every 30 minutes. Two jobs at once: it records results as they land,
    # and -- more importantly -- it is what FREEZES each pick. A pick only locks on
    # a run that happens inside LOCK_WINDOW_HOURS of kickoff, so the publish cadence
    # must be at least as tight as that window or a fixture can slip through the gap
    # unlocked, get locked after kickoff, and be voided out of the record.
    # Every 30 minutes through the match window. This is tight because the pick now
    # locks only 45 minutes before kickoff, so that a confirmed starting XI (published
    # ~1h before) can still reach the model. The lock can only happen on a run that
    # lands inside that 45-minute window, so runs must be closer together than the
    # window is wide.
    # Every day, not only the traditional weekend windows. This covers Tuesday-
    # Thursday matchweeks and rescheduled fixtures; the interval remains narrower
    # than the 45-minute lock window.
    - cron: "0,30 11-22 * * *"
  workflow_dispatch:            # lets you run it by hand from the Actions tab

concurrency:
  group: leagues-refresh        # never let two runs race on the same files
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # WHY 120, not 30: every run so far has timed out or been cancelled before
    # completing, which means the soccerdata cache below has NEVER once been
    # saved -- actions/cache only saves at the end of a successful job, and no
    # job has ever reached the end. leagues.publish fetches shot events ONE
    # HTTP REQUEST PER HISTORICAL MATCH (soccerdata's Understat._read_match,
    # cached to disk permanently since a played match never changes). Cold,
    # across 5 seasons x 4 leagues, that is ~6,860 individual page fetches --
    # timed at ~15 minutes for the Premier League alone in the last real run,
    # so ~60 minutes for all four leagues before publish/sanity/tests/commit
    # even start. This is a ONE-TIME cost: once a single run is allowed to
    # finish, the cache is saved, every later run restores it via
    # restore-keys and only needs to fetch the handful of matches in the
    # CURRENT season (soccerdata skips its cache for the in-progress season
    # by design), which is fast. 120 minutes gives that first run room to
    # actually complete. Tighten this back down once a few warm runs have
    # been observed finishing quickly -- do not lower it before that,
    # or the cache never gets the chance to populate at all.
    timeout-minutes: 120
    permissions:
      contents: write           # needed to push the regenerated JSON

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # soccerdata caches scraped pages here; re-using it across runs keeps us
      # light on Understat/football-data rather than re-downloading every time.
      - name: Cache soccerdata
        uses: actions/cache@v4
        with:
          path: ~/soccerdata
          key: soccerdata-${{ github.run_id }}
          restore-keys: soccerdata-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Free public roster evidence. This is deliberately before the model: a
      # missing/thin club roster makes that club's player markets disappear
      # instead of allowing last season's departed players to survive silently.
      - name: Refresh and audit current rosters
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python -m scripts.sync_rosters
          python -m scripts.roster_integrity_check

      # Research every fixture inside 72h directly from the fixture feed, not the
      # previous best.json. This guarantees that a newly generated Best Pick was
      # checked before the final publish and cannot deadlock the freshness gate.
      # Explicit absences still require two different original publishers.
      - name: Refresh multi-source team news
        run: python -m scripts.sync_team_news

      - name: Refresh confirmed pre-match lineups
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m scripts.sync_lineups

      - name: Publish all four leagues
        run: python -m leagues.publish
        env:
          # Two independent leagues at once roughly halves a cold Understat build
          # without aggressively fanning out against a free public service.
          PUBLISH_WORKERS: "2"

      # The gate: refuses to ship output that contradicts itself (a pick against
      # its own scoreline, a table that doesn't add up, an eliminated team still
      # favoured). Non-zero exit fails the job BEFORE anything is committed.
      - name: Sanity-check the published payloads
        run: python -m scripts.sanity_check

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Commit refreshed league data
        id: commit
        run: |
          git config user.name  "leagues-bot"
          git config user.email "actions@github.com"
          # ONLY league files -- never the World Cup app's data.
          git add data/leagues data-raw/leagues
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No league changes to publish."
          else
            # Captured BEFORE committing: the commit this job actually started
            # from. A cold-cache publish can take 50+ minutes, comfortably
            # longer than the gap between scheduled triggers, so by the time we
            # get here another run may already have finished and pushed FRESHER
            # data. A bare `git push` failing on that is not really a failure --
            # it means someone else's more current publish already landed.
            BASE=$(git rev-parse HEAD)
            git commit -m "auto: leagues refresh $(date -u +%Y-%m-%d)"
            git fetch -q origin main
            REMOTE=$(git rev-parse origin/main)
            if [ "$REMOTE" != "$BASE" ]; then
              # Deliberately do NOT rebase/merge and retry: two independent runs
              # rarely produce byte-identical JSON, so forcing our (now-stale)
              # commit on top would risk a real conflict on the data files
              # themselves. The other run's data supersedes ours and its own
              # push already triggered its own deploy, so standing down here is
              # correct, not a compromise -- and it lets the job conclude as a
              # SUCCESS, which is what allows the soccerdata cache below to
              # actually save. A job that fails at this step, for any reason,
              # skips that save every time, which is why the cache had never
              # once warmed up despite several genuinely successful publishes.
              echo "origin/main advanced from $BASE to $REMOTE while this run was publishing -- a fresher run already landed, standing down instead of forcing stale data over it."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              git push
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      # Render is connected by public Git URL and does NOT auto-deploy on push,
      # so the redeploy must be triggered explicitly.
      - name: Trigger Render deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          # Strip whitespace defensively (cheap, never hurts), but this was NOT
          # the actual cause of the failures found today -- the real one was
          # worse: the secret held the local FILE PATH used for manual deploys
          # (C:\Users\...\...txt) instead of the URL that file contains. The
          # leading "C:" got parsed as a host with a non-numeric "port", which
          # is why curl's own error was "Port number was not a decimal number
          # between 0 and 65535". The shape check below catches that class of
          # mistake with a clear message instead of a cryptic curl exit code.
          HOOK="$(printf '%s' "$HOOK" | tr -d '[:space:]')"
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set -- data was pushed but the site was not redeployed."
            exit 1
          fi
          case "$HOOK" in
            https://api.render.com/deploy/*) ;;
            *) echo "::error::RENDER_DEPLOY_HOOK does not look like a Render deploy hook URL -- check the secret holds the hook itself, not a file path or something else pasted by mistake."
               exit 1 ;;
          esac
          code=$(curl --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 30 -sS -o /dev/null \
            -w "%{http_code}" -X POST "$HOOK")
          echo "deploy hook responded $code"
          [ "$code" = "200" ] || [ "$code" = "201" ]

      # Nothing above this line reaches a human. The gate correctly refuses to ship
      # a bad publish and the page correctly warns readers after 72h, but the owner
      # only finds out via GitHub's failure email -- which is easy to miss for a job
      # that normally succeeds silently every week. This says it out loud.
      #
      # if: failure() so it fires for ANY failed step above (fetch, gate, tests,
      # deploy), not just the last one. Skipped silently when the secret is absent,
      # because a missing notifier must never itself fail the run.
      - name: Alert on failure
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT" ]; then
            echo "No Telegram secrets set; skipping alert."
            exit 0
          fi
          TEXT="Leagues pipeline FAILED ($(date -u +%Y-%m-%d\ %H:%M) UTC).
          Check the named failed step in Actions. A failure after the commit step may mean data was pushed but Render was not refreshed.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${TEXT}" >/dev/null
          echo "Alert sent."
