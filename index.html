<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Football Predictor</title>
<meta name="theme-color" content="#05060d">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="sky"></div>
<div class="wrap">
  <nav class="switcher" id="switcher"></nav>
  <main id="app"><p class="sub">Loading…</p></main>
</div>

<script>
// Each competition is described here; the switcher and router are generic.
const COMPETITIONS = [
  {key: "best",       label: "★ Best Picks",    data: "data/leagues/best.json",       kind: "best"},
  {key: "players",    label: "★ Player Picks",  data: "data/leagues/player_picks.json", kind: "players"},
  {key: "grades",     label: "Grades",          data: "data/leagues/best.json",       kind: "grades"},
  // The World Cup is complete and frozen. Its own page carries the full bracket
  // and the final 64-26 record; re-rendering a thinner version inside this app
  // would lose the bracket for no benefit, so the tab links out to it instead.
  {key: "wc",         label: "World Cup 2026",  href: "worldcup.html"},
  {key: "pl",         label: "Premier League",  data: "data/leagues/pl.json",         clubs: "data/leagues/clubs.json",            kind: "league"},
  {key: "laliga",     label: "La Liga",         data: "data/leagues/laliga.json",     clubs: "data/leagues/clubs_laliga.json",     kind: "league"},
  {key: "bundesliga", label: "Bundesliga",      data: "data/leagues/bundesliga.json", clubs: "data/leagues/clubs_bundesliga.json", kind: "league"},
  {key: "ligue1",     label: "Ligue 1",         data: "data/leagues/ligue1.json",     clubs: "data/leagues/clubs_ligue1.json",     kind: "league"},
];

// Always re-fetch the data files. Render serves these as ordinary static assets,
// so a returning visitor's browser will happily reuse a cached copy -- meaning the
// site can be fully up to date on the server while a reader still sees last week's
// fixtures. Nothing in the publish pipeline or the deploy gate can detect that,
// because it happens entirely in someone else's browser. The HTML/CSS may still be
// cached normally; only the data must never be.
const NO_CACHE = {cache: 'no-store'};

const pct = (n, d = 0) => `${Number(n).toFixed(d)}%`;
const num = (n, d = 1) => Number(n).toFixed(d);
// Escape any string interpolated into innerHTML. The data is trusted, but a club
// or player name containing & < > ' " would otherwise corrupt the markup.
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g,
  c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function recordChip(rec) {
  const chip = el('div', 'record-chip');
  chip.innerHTML = (rec && rec.total)
    ? `<b>${rec.correct}–${rec.wrong}</b> · ${pct(100 * rec.correct / rec.total)} of ${rec.total} graded picks`
    : 'No graded picks yet — the season starts in August';
  return chip;
}

// ---------------- shared: league (and any round-robin) view ----------------
function propList(props) {
  return props.map(p => `
    <li class="${p.penalty_taker ? 'pen' : ''}">
      <span class="who">${esc(p.player)}</span>
      <span class="pct">${num(p.anytime_pct)}%</span>
      <span class="shots">${num(p.exp_shots)} shot attempts · ${Math.round(p.p_shots_2plus)}% 2+ · ${Math.round(p.p_sot_1plus)}% on target</span>
    </li>`).join('');
}

// Why the model rates a fixture the way it does. Deliberately plain language and
// signed percentages: the point is that a reader can disagree with it. A card that
// only shows 78% can only be believed or ignored.
function whyBlock(w, home, away) {
  if (!w) return '';
  const sign = v => `${v >= 0 ? '+' : ''}${num(v, 0)}%`;
  const row = (label, v) =>
    `<span class="wy"><b class="${v >= 0 ? 'up' : 'dn'}">${sign(v)}</b> ${esc(label)}</span>`;
  return `<details class="why"><summary>Why this pick</summary>
    <div class="why-rows">
      ${row(`${home} attack`, w.home_attack_pct)}
      ${row(`${home} defence`, w.home_defence_pct)}
      ${row(`${away} attack`, w.away_attack_pct)}
      ${row(`${away} defence`, w.away_defence_pct)}
      ${row('home advantage', w.home_advantage_pct)}
    </div>
    <p class="why-note">Each figure is that side's strength against the league
    average, after time-decay and shrinkage. Higher defence is better.</p>
  </details>`;
}

function renderLeague(app, data, clubs, label) {
  const colour = t => (clubs[t] || {}).primary || '#8891a8';
  app.append(el('h1', 'dsp', `${label} <span>2026-27</span>`));
  app.append(recordChip(data.record));

  if (data.matches && data.matches.length) {
    app.append(el('h2', 'dsp', `Matchweek ${data.matches[0].matchweek}`));
    const grid = el('section', 'fixtures');
    for (const m of data.matches) {
      const card = el('article', 'card glass');
      card.style.setProperty('--home', colour(m.home));
      card.style.setProperty('--away', colour(m.away));
      const p = m.prediction;
      const homeProps = m.props.filter(x => x.team === m.home);
      const awayProps = m.props.filter(x => x.team === m.away);
      const when = new Date(m.date).toLocaleDateString('en-GB',
        { weekday: 'short', day: 'numeric', month: 'short' });
      const mkt = m.market ? `<div class="probs" style="margin-top:6px">
          <span>market <b>${pct(100 * m.market.p_home)}</b></span>
          <span><b>${pct(100 * m.market.p_draw)}</b></span>
          <span><b>${pct(100 * m.market.p_away)}</b></span>
        </div>
        <div class="mw" style="margin-top:4px">Model edge on the pick: <b>${m.market.edge >= 0 ? '+' : ''}${pct(100 * m.market.edge, 1)}</b></div>` : '';
      const side = (team, props) => props.length
        ? `<div class="side-label">${team} — likely scorers</div><ul class="props">${propList(props)}</ul>`
        : `<div class="side-label">${team} — likely scorers</div><p class="missing">No player data: newly promoted, so they have no top-flight record yet.</p>`;
      card.innerHTML = `
        <div class="mw">${when} · ${esc(m.venue || '')}</div>
        <header><span class="team">${esc(m.home)}</span><span class="score">${esc(p.score)}</span><span class="team away">${esc(m.away)}</span></header>
        <div class="pick">Pick: <strong>${esc(p.pick)}</strong> <span class="conf">${'★'.repeat(p.confidence)}</span></div>
        <div class="probs"><span><b>${pct(100 * p.p_home)}</b></span><span>draw <b>${pct(100 * p.p_draw)}</b></span><span><b>${pct(100 * p.p_away)}</b></span></div>
        ${(p.top_scores || []).length ? `<div class="scores">
          <span class="sc-label">Scoreline</span>
          ${p.top_scores.map((s, i) => `<span class="sc ${s.score === p.score ? 'call' : ''}"
             title="${s.agrees_with_pick ? 'agrees with the pick' : 'implies a different result'}">
             ${esc(s.score)} <b>${num(s.pct)}%</b></span>`).join('')}
        </div>` : ''}
        ${mkt}
        ${whyBlock(p.why, m.home, m.away)}
        ${side(m.home, homeProps)}
        ${side(m.away, awayProps)}`;
      grid.append(card);
    }
    app.append(grid);
  }

  app.append(el('h2', 'dsp', 'Projected final table'));
  if ((data.data_warnings || []).length) {
    app.append(el('div', 'warn', `<b>Heads up —</b> ${data.data_warnings.join(' ')}`));
  }
  const wrap = el('div', 'table-wrap glass');
  const rows = data.table.map((t, i) => {
    const rel = i >= data.table.length - 3 ? 'rel' : '', ucl = i < 4 ? 'ucl' : '';
    return `<tr class="${rel} ${ucl}">
      <td class="num">${i + 1}</td>
      <td><span class="dot" style="background:${esc(colour(t.team))}"></span>${esc(t.team)}</td>
      <td class="num">${num(t.proj_points)}</td>
      <td class="barcell"><span class="bar" style="--pct:${Math.min(t.title_pct, 100)}%"></span><span>${num(t.title_pct)}%</span></td>
      <td class="num">${num(t.top4_pct)}%</td>
      <td class="num">${num(t.relegation_pct)}%</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="league-table">
    <thead><tr><th>#</th><th>Team</th><th>Proj pts</th><th>Title</th><th>Top 4</th><th>Relegation</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
  app.append(wrap);

  renderSeason(app, data);
  renderPerformance(app, data);
}

// Whole-season fixtures & results, grouped by matchweek. Collapsed to the current
// matchweek by default — 380 rows open is unusable; you expand what you want.
function renderSeason(app, data) {
  const season = data.season || [];
  if (!season.length) return;
  app.append(el('h2', 'dsp', 'Fixtures & results'));

  const weeks = [...new Set(season.map(m => m.matchweek))].sort((a, b) => a - b);
  // default open: the earliest week that still has an unplayed match
  const current = (season.find(m => !m.result) || season[season.length - 1]).matchweek;

  const wrap = el('div', 'season glass');
  wrap.innerHTML = weeks.map(w => {
    const rows = season.filter(m => m.matchweek === w).map(m => {
      const when = new Date(m.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      let score = '<span class="tbd">—</span>', mark = '';
      if (m.result) {
        score = `<b>${m.result.home_goals}–${m.result.away_goals}</b>`;
        if (m.void) mark = `<span class="tick void" title="pick locked late — excluded from the record">✓✗*</span>`;
        else if (m.graded === 'correct') mark = '<span class="tick correct">✓</span>';
        else if (m.graded === 'wrong') mark = '<span class="tick wrong">✗</span>';
      }
      return `<tr>
        <td class="fx-d">${when}</td>
        <td class="fx-t">${esc(m.home)}</td>
        <td class="fx-s">${score}</td>
        <td class="fx-t away">${esc(m.away)}</td>
        <td class="fx-p">${m.pick ? `<span class="pk">${esc(m.pick)}</span>` : ''}${mark}</td>
      </tr>`;
    }).join('');
    return `<details ${w === current ? 'open' : ''}>
      <summary>Matchweek ${w}</summary>
      <table class="fx-table"><tbody>${rows}</tbody></table>
    </details>`;
  }).join('');
  app.append(wrap);
}

// shared performance panel (league backtest vs market + props gate)
function renderPerformance(app, data) {
  const b = data.backtest || {}, pb = data.props_backtest || {};
  if (!b.rps) return;
  app.append(el('h2', 'dsp', 'Does this model actually work?'));
  const perf = el('section', 'performance glass');
  perf.innerHTML = `
    <p>Walk-forward tested on <b>${b.n}</b> past matches, always training only on games
    played before the one predicted. It called <b>${pct(100 * b.accuracy, 1)}</b> correctly,
    ranked-probability score <b>${num(b.rps, 4)}</b> (lower is better).</p>
    <p>The betting market's closing odds, stripped of margin, score
    <b>${pct(100 * b.market_accuracy, 1)}</b> and <b>${num(b.market_rps, 4)}</b> — still
    slightly better than us, which is the honest expected result.</p>
    <div class="metrics">
      <div class="metric"><b>${pct(100 * b.accuracy, 1)}</b>model accuracy</div>
      <div class="metric"><b>${num(b.rps, 4)}</b>model RPS</div>
      <div class="metric"><b>${num(b.market_rps, 4)}</b>market RPS</div>
      ${pb.goals_lift ? `<div class="metric"><b>+${num(pb.goals_lift)}%</b>scorer picks vs baseline</div>` : ''}
      ${pb.shots_lift ? `<div class="metric"><b>+${num(pb.shots_lift)}%</b>shot-attempt picks vs baseline</div>` : ''}
    </div>`;
  app.append(perf);
}

// World Cup has no market-odds backtest (no odds data), so its "performance" is
// the honest live pick record, broken down by the model's OWN stated confidence —
// a calibration check: higher-confidence picks should hit more often.

// ---------------- Best Picks: the high-confidence board ----------------
function renderBest(app, data) {
  app.append(el('h1', 'dsp', 'Best Picks <span>all leagues</span>'));

  const rec = data.record || {};
  const chip = el('div', 'record-chip');
  chip.innerHTML = rec.total
    ? `<b>${rec.correct}–${rec.wrong}</b> · ${pct(100 * rec.correct / rec.total)} on ${rec.total} settled best picks`
    : 'No settled best picks yet — the season starts in August';
  app.append(chip);

  // State plainly what this tier is worth, from the backtest, so the badge is not
  // mistaken for certainty.
  app.append(el('div', 'best-note',
    `The fixtures the model is most sure about — <b>${pct(100 * (data.min_probability || 0))}</b> or higher. ` +
    `Walk-forward across all four leagues, picks at this level landed ` +
    `<b>${num(data.backtested_hit_rate_pct)}%</b> of the time, against ` +
    `<b>${num(data.backtested_all_picks_pct)}%</b> for every pick it makes. ` +
    // Say what this tier is and is not. Tested against de-vigged closing odds, the
    // model's pick here is the SAME pick the market makes, every time. The hit rate
    // is real; the implication that we spotted something others missed would not be.
    `These are clear favourites, not bets the bookmakers have got wrong — they rate ` +
    `these matches much as we do. Graded separately so this tier can be judged on its own.`));

  const up = data.upcoming || [];
  app.append(el('h2', 'dsp', up.length ? 'Next up' : 'Nothing above the bar right now'));
  if (up.length) {
    const grid = el('section', 'fixtures');
    for (const m of up) {
      const card = el('article', 'card glass best');
      const when = new Date(m.date).toLocaleDateString('en-GB',
        { weekday: 'short', day: 'numeric', month: 'short' });
      card.innerHTML = `
        <div class="mw">${esc(m.league)} · MW${m.matchweek} · ${when}${m.provisional ? ' · provisional' : ''}</div>
        <header><span class="team">${esc(m.home)}</span><span class="score">${esc(m.score || '')}</span><span class="team away">${esc(m.away)}</span></header>
        <div class="pick">Pick: <strong>${esc(m.pick)}</strong> <span class="conf">${'★'.repeat(m.confidence || 0)}</span></div>
        <div class="bp-prob"><span class="bar" style="--pct:${Math.round(100 * (m.p_pick || 0))}%"></span>
          <span>${pct(100 * (m.p_pick || 0))} confident</span></div>`;
      grid.append(card);
    }
    app.append(grid);
  }

  const settled = data.settled || [];
  if (settled.length) {
    app.append(el('h2', 'dsp', 'Recently settled'));
    const wrap = el('div', 'table-wrap glass');
    wrap.innerHTML = `<table class="league-table">
      <thead><tr><th></th><th>League</th><th>Match</th><th>Pick</th><th>Conf</th><th>Result</th></tr></thead>
      <tbody>${settled.map(s => {
        const mark = s.void ? '<span class="tick void">✓✗*</span>'
          : s.graded === 'correct' ? '<span class="tick correct">✓</span>'
          : '<span class="tick wrong">✗</span>';
        return `<tr>
          <td>${mark}</td>
          <td class="num">${esc(s.league)}</td>
          <td>${esc(s.home)} v ${esc(s.away)}</td>
          <td>${esc(s.pick)}</td>
          <td class="num">${pct(100 * (s.p_pick || 0))}</td>
          <td class="num">${s.result ? `${s.result.home_goals}–${s.result.away_goals}` : ''}</td>
        </tr>`; }).join('')}</tbody></table>`;
    app.append(wrap);
  }
}

// ---------------- shared: player picks ----------------
const MARKET_ORDER = ['goal', 'shots', 'sot'];

function playerCards(rows) {
  const grid = el('section', 'fixtures');
  for (const p of rows) {
    const card = el('article', 'card glass best');
    const when = new Date(p.date).toLocaleDateString('en-GB',
      { weekday: 'short', day: 'numeric', month: 'short' });
    const flags = [
      p.provisional ? 'provisional' : '',
      p.doubt ? 'fitness doubt' : '',
      p.penalty_taker ? 'penalties' : '',
      p.gradeable === false ? 'not gradeable' : '',
    ].filter(Boolean).join(' · ');
    card.innerHTML = `
      <div class="mw">${esc(p.league)} · ${when}${flags ? ' · ' + esc(flags) : ''}</div>
      <header><span class="team">${esc(p.player)}</span></header>
      <div class="sub">${esc(p.team)} · ${esc(p.home)} v ${esc(p.away)}</div>
      <div class="pick">${esc(p.line)} <span class="conf">${'★'.repeat(p.confidence || 0)}</span></div>
      <div class="bp-prob"><span class="bar" style="--pct:${Math.round(100 * (p.p_pick || 0))}%"></span>
        <span>${pct(100 * (p.p_pick || 0))} likely</span></div>`;
    grid.append(card);
  }
  return grid;
}

function renderPlayers(app, data) {
  app.append(el('h1', 'dsp', 'Player Picks <span>all leagues</span>'));

  const rec = data.record || {};
  const chip = el('div', 'record-chip');
  chip.innerHTML = rec.total
    ? `<b>${rec.correct}–${rec.wrong}</b> · ${pct(100 * rec.correct / rec.total)} on ${rec.total} settled player picks`
    : 'No settled player picks yet — the season starts in August';
  app.append(chip);

  const bars = data.min_probability || {};
  // Say out loud why the goalscorer bar is lower. A reader comparing a 45%
  // goalscorer pick with a 78% shots pick should know the first is near the
  // ceiling of its market, not a weaker pick.
  app.append(el('div', 'best-note',
    `Shot markets need <b>${pct(100 * (bars.shots || 0))}</b> to make this board. ` +
    `Anytime goalscorer needs <b>${pct(100 * (bars.goal || 0))}</b> — deliberately lower, because ` +
    `no player reaches 70% to score: a team scores about 1.5 goals and one man takes a share of them, ` +
    `so the best goalscorer chance in any of these leagues sits near 50%. ` +
    `Each card shows its own number, and the three markets are graded separately.` +
    ((data.ungradeable_leagues || []).length
      ? ` <b>${esc(data.ungradeable_leagues.join(', '))}</b> has no shot-level feed, so its player picks are shown but cannot be graded.`
      : '')));

  const up = data.upcoming || [];
  for (const mk of MARKET_ORDER) {
    const rows = up.filter(p => p.market === mk);
    if (!rows.length) continue;
    app.append(el('h2', 'dsp', esc((data.markets || {})[mk] || mk)));
    app.append(playerCards(rows));
  }
  if (!up.length) app.append(el('h2', 'dsp', 'Nothing above the bar right now'));
}

// ---------------- grades: every graded pick, by tier ----------------
function gradeTable(rows, kind) {
  const wrap = el('div', 'table-wrap glass');
  const head = kind === 'player'
    ? '<th></th><th>League</th><th>Player</th><th>Market</th><th>Conf</th><th>Actual</th>'
    : '<th></th><th>League</th><th>Match</th><th>Pick</th><th>Conf</th><th>Result</th>';
  wrap.innerHTML = `<table class="league-table">
    <thead><tr>${head}</tr></thead>
    <tbody>${rows.map(s => {
      const mark = s.void ? '<span class="tick void">✓✗*</span>'
        : s.graded === 'correct' ? '<span class="tick correct">✓</span>'
        : '<span class="tick wrong">✗</span>';
      const last = kind === 'player'
        ? (s.actual === null || s.actual === undefined ? 'did not shoot' : esc(String(s.actual)))
        : (s.result ? `${s.result.home_goals}–${s.result.away_goals}` : '');
      const mid = kind === 'player'
        ? `<td>${esc(s.player)}</td><td>${esc(s.line)}</td>`
        : `<td>${esc(s.home)} v ${esc(s.away)}</td><td>${esc(s.pick)}</td>`;
      return `<tr><td>${mark}</td><td class="num">${esc(s.league)}</td>${mid}
        <td class="num">${pct(100 * (s.p_pick || 0))}</td>
        <td class="num">${last}</td></tr>`; }).join('')}</tbody></table>`;
  return wrap;
}

function tierRow(label, rec, note) {
  const hit = rec && rec.total ? pct(100 * rec.correct / rec.total) : '—';
  return `<div class="metric"><b>${hit}</b>${esc(label)}${
    rec && rec.total ? ` (${rec.correct}–${rec.wrong})` : ' · none graded yet'}${
    note ? `<br><small>${esc(note)}</small>` : ''}</div>`;
}

// Stated vs observed over time. A single number cannot show drift, and drift is
// the thing that actually signals trouble -- a 65% pick losing three in a row is
// normal, stated confidence pulling away from observed results over dozens of picks
// is not. Drawn as a plain inline SVG: no library, no external request.
function driftChart(hist) {
  const pts = (hist || []).filter(h => h.stated_pct != null && h.actual_pct != null);
  if (pts.length < 2) return null;
  const W = 620, H = 170, PAD = 34;
  const xs = i => PAD + i * (W - 2 * PAD) / Math.max(1, pts.length - 1);
  const lo = Math.min(40, ...pts.map(p => Math.min(p.stated_pct, p.actual_pct)) ) - 5;
  const hi = Math.max(90, ...pts.map(p => Math.max(p.stated_pct, p.actual_pct)) ) + 5;
  const ys = v => H - PAD - (v - lo) * (H - 2 * PAD) / (hi - lo);
  const path = key => pts.map((p, i) => `${i ? 'L' : 'M'}${xs(i).toFixed(1)},${ys(p[key]).toFixed(1)}`).join(' ');
  const wrap = el('div', 'table-wrap glass');
  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" class="drift" role="img"
      aria-label="Stated confidence versus actual hit rate over time">
    <line x1="${PAD}" y1="${ys(lo)}" x2="${W - PAD}" y2="${ys(lo)}" class="ax"/>
    <path d="${path('stated_pct')}" class="ln stated"/>
    <path d="${path('actual_pct')}" class="ln actual"/>
    <text x="${PAD}" y="14" class="lg"><tspan class="k-stated">■</tspan> stated confidence
      <tspan class="k-actual" dx="12">■</tspan> actually won</text>
    <text x="${PAD}" y="${H - 8}" class="tk">${esc(pts[0].date)}</text>
    <text x="${W - PAD}" y="${H - 8}" class="tk" text-anchor="end">${esc(pts[pts.length - 1].date)}</text>
  </svg>`;
  return wrap;
}

function renderGrades(app, d) {
  const best = d.best || {}, pl = d.players || {};
  app.append(el('h1', 'dsp', 'Grades <span>how every tier is doing</span>'));
  app.append(el('div', 'best-note',
    `Every pick here was frozen before kickoff and graded against the result — never re-picked ` +
    `afterwards. The tiers are scored <b>separately</b> on purpose: pooling a high-confidence ` +
    `board with every routine pick would hide which one is actually earning its billing.`));

  const tiers = el('section', 'performance glass');
  tiers.innerHTML = `<div class="metrics">
    ${tierRow('Best Picks (match winner)', best.record)}
    ${tierRow('Player picks (all markets)', pl.record)}
    ${MARKET_ORDER.map(mk => tierRow(
        (pl.markets || {})[mk] || mk, (pl.record_by_market || {})[mk])).join('')}
    ${(d.leagues || []).map(l => tierRow(l.label + ' — every pick', l.record)).join('')}
  </div>`;
  app.append(tiers);

  const chart = driftChart(d.history);
  if (chart) {
    app.append(el('h2', 'dsp', 'Is it still calibrated?'));
    app.append(chart);
    app.append(el('p', 'sub', 'The two lines should track each other. Stated ' +
      'confidence drifting persistently above what actually wins is the signal ' +
      'that the model needs attention — a bad week on its own is not.'));
  }

  const bs = best.settled || [];
  app.append(el('h2', 'dsp', 'Best Picks — settled'));
  app.append(bs.length ? gradeTable(bs, 'match')
    : el('p', 'sub', 'Nothing settled yet — the season starts in August.'));

  const ps = (pl.settled || []).filter(s => s.graded === 'correct' || s.graded === 'wrong' || s.void);
  app.append(el('h2', 'dsp', 'Player picks — settled'));
  app.append(ps.length ? gradeTable(ps, 'player')
    : el('p', 'sub', 'Nothing settled yet — the season starts in August.'));
}


// ---------------- router ----------------
function activeKey() {
  const k = location.hash.replace('#', '');
  return COMPETITIONS.some(c => c.key === k) ? k : COMPETITIONS[0].key;
}

function renderSwitcher() {
  const nav = document.getElementById('switcher');
  nav.innerHTML = '';
  const active = activeKey();
  for (const c of COMPETITIONS) {
    const a = el('a', c.key === active ? 'active' : '', c.label);
    a.href = c.href || `#${c.key}`;
    nav.append(a);
  }
}

// The Grades tab is the one view that spans every file: the two boards plus each
// league's all-picks record. A single missing file must degrade that one tier to
// "none graded yet" rather than empty the whole page, so each fetch is caught.
const getJSON = url => fetch(url, NO_CACHE).then(r => r.json()).catch(() => ({}));

async function gradesData(best) {
  const leagueComps = COMPETITIONS.filter(c => c.kind === 'league');
  const [players, history, ...leagues] = await Promise.all([
    getJSON('data/leagues/player_picks.json'),
    getJSON('data/leagues/record_history.json'),
    ...leagueComps.map(c => getJSON(c.data)),
  ]);
  return {
    best, players,
    history: Array.isArray(history) ? history : [],
    leagues: leagueComps.map((c, i) => ({ label: c.label, record: leagues[i].record })),
  };
}

// How old the data may get before the page says so. Publishing runs Tuesday and
// after each weekend, so a gap beyond ~3 days means a run failed or a league
// aborted. The check lives HERE, in the browser, on purpose: the deploy gate can
// only refuse to ship a stale file, it cannot tell you the site is already showing
// one. If the whole pipeline dies, this is the only thing left that still knows
// what day it is -- and it fails towards telling the reader, not reassuring them.
const STALE_AFTER_HOURS = 72;

function staleBanner(data) {
  const upd = data && data.updated;
  if (!upd) return null;
  const age = (Date.now() - new Date(upd).getTime()) / 36e5;
  if (!(age > STALE_AFTER_HOURS)) return null;
  const days = Math.floor(age / 24);
  return el('div', 'warn',
    `<b>This data is ${days} day${days === 1 ? '' : 's'} old.</b> ` +
    `It was last updated ${new Date(upd).toLocaleString('en-GB')}, so results and ` +
    `team news since then are not reflected. Picks shown may already have been played.`);
}

async function route() {
  renderSwitcher();
  let comp = COMPETITIONS.find(c => c.key === activeKey());
  // A link-only entry (the World Cup) has no data to render here. If the hash
  // still names one -- an old bookmark -- fall back to the default view rather
  // than throwing on comp.data.
  if (comp && comp.href) { location.replace(comp.href); return; }
  if (!comp) comp = COMPETITIONS[0];
  const app = document.getElementById('app');
  app.innerHTML = '<p class="sub">Loading…</p>';
  let data, clubs;
  try {
    data = await fetch(comp.data, NO_CACHE).then(r => r.json());
    clubs = comp.clubs ? await fetch(comp.clubs, NO_CACHE).then(r => r.json()) : {};
  } catch (err) {
    if (activeKey() === comp.key) app.innerHTML = `<p class="sub">Could not load ${comp.label}.</p>`;
    return;
  }
  // The user may have switched competitions while this fetch was in flight; if so,
  // a newer route() already owns the page — don't clobber it with stale content.
  if (activeKey() !== comp.key) return;
  app.innerHTML = '';
  // Staleness is announced BEFORE the content, on every view, so it cannot be
  // scrolled past or mistaken for current data.
  const stale = staleBanner(data);
  if (stale) app.append(stale);
  // Render errors are NOT caught here: a code bug should surface in the console,
  // not be silently disguised as a "Could not load" network message.
  if (comp.kind === 'best') renderBest(app, data);
  else if (comp.kind === 'players') renderPlayers(app, data);
  else if (comp.kind === 'grades') {
    // gradesData awaits four more fetches. The guard above already fired, so it
    // must be re-checked here or a slow Grades load lands on top of whatever view
    // the user switched to meanwhile. This is the only branch that awaits twice.
    const g = await gradesData(data);
    if (activeKey() !== comp.key) return;
    renderGrades(app, g);
  }
  else renderLeague(app, data, clubs, comp.label);
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
